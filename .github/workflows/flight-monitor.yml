name: 🛫 北京→巴黎 机票监控

on:
  schedule:
    # 北京时间 8:00 = UTC 0:00
    - cron: '0 0 * * *'
    # 北京时间 12:00 = UTC 4:00
    - cron: '0 4 * * *'
    # 北京时间 20:00 = UTC 12:00
    - cron: '0 12 * * *'
  workflow_dispatch:  # 允许手动触发

jobs:
  monitor:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq libnss3 libnspr4 libatk-bridge2.0-0 libdrm2 libxkbcommon0 libgbm1 libasound2

      - name: Install Python packages
        run: pip install flights letsfg

      - name: Install Playwright Chromium
        run: playwright install chromium

      - name: Run flight monitor
        env:
          QQ_EMAIL: ${{ secrets.QQ_EMAIL }}
          QQ_SMTP_CODE: ${{ secrets.QQ_SMTP_CODE }}
          RECIPIENT_EMAIL: kesijin9@gmail.com
        run: python surveillance.py --email
